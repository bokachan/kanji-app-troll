<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字道 · Kanji-dō</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   KANJI-DŌ — Style sheet
   Aesthetic: Japanese ink on paper — refined, calm, typographic
   ============================================================ */

:root {
  --ink:       #1a1410;
  --ink-soft:  #3d3530;
  --ink-muted: #7a6f68;
  --paper:     #f7f3ed;
  --paper-2:   #efe9e0;
  --paper-3:   #e5ddd2;
  --red:       #c0392b;
  --red-soft:  #e8d5d3;
  --blue:      #2c5f8a;
  --blue-soft: #d2e4f0;
  --gold:      #b8860b;
  --gold-soft: #f5edd5;
  --green:     #2d6a4f;
  --green-soft:#d8ead3;

  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --shadow:    0 2px 12px rgba(26,20,16,.10);
  --shadow-lg: 0 8px 32px rgba(26,20,16,.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--ink);
  color: var(--paper);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(26,20,16,.25);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 24px;
  height: 64px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.logo-kanji {
  font-family: 'Shippori Mincho', serif;
  font-size: 32px;
  color: #e8b84b;
  line-height: 1;
}
.logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}
.logo-title {
  font-weight: 500;
  font-size: 15px;
  letter-spacing: .05em;
  color: #f0ebe3;
}
.logo-sub {
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  color: #9a9080;
  letter-spacing: .12em;
}
.main-nav {
  display: flex;
  gap: 4px;
  flex: 1;
  flex-wrap: wrap;
}
.nav-btn {
  background: transparent;
  border: none;
  color: #b0a898;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
}
.nav-btn:hover { background: rgba(255,255,255,.08); color: #f0ebe3; }
.nav-btn.active { background: rgba(232,184,75,.15); color: #e8b84b; }
.header-score {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.score-label { font-size: 10px; color: #9a9080; letter-spacing: .1em; text-transform: uppercase; }
.score-value { font-family: 'Shippori Mincho', serif; font-size: 22px; color: #e8b84b; line-height: 1; }

/* ── LEÇON BAR ── */
.lecon-bar {
  background: var(--paper-2);
  border-bottom: 1px solid var(--paper-3);
  display: flex;
  gap: 6px;
  padding: 10px 24px;
  overflow-x: auto;
  max-width: 100%;
  scrollbar-width: thin;
}
.lecon-btn {
  background: var(--paper);
  border: 1.5px solid var(--paper-3);
  color: var(--ink-muted);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
  flex-shrink: 0;
}
.lecon-btn:hover { border-color: var(--ink-muted); color: var(--ink); }
.lecon-btn.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

/* ── VIEWS ── */
#app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 24px;
}
.view { display: none; }
.view.active { display: block; }

/* ── LIST VIEW ── */
.list-search {
  margin-bottom: 20px;
}
.list-search input {
  width: 100%;
  max-width: 400px;
  background: var(--paper);
  border: 1.5px solid var(--paper-3);
  border-radius: var(--radius-md);
  padding: 10px 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color .18s;
}
.list-search input:focus { border-color: var(--ink-muted); }

.kanji-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.kanji-card {
  background: var(--paper);
  border: 1.5px solid var(--paper-3);
  border-radius: var(--radius-md);
  padding: 16px 12px 12px;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  position: relative;
  overflow: hidden;
}
.kanji-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--paper-3);
  transition: background .2s;
}
.kanji-card:hover { border-color: var(--ink-muted); box-shadow: var(--shadow); transform: translateY(-2px); }
.kanji-card:hover::before { background: var(--gold); }

.kanji-card .kc-char {
  font-family: 'Shippori Mincho', serif;
  font-size: 44px;
  line-height: 1;
  color: var(--ink);
}
.kanji-card .kc-on {
  font-size: 11px;
  color: var(--blue);
  font-weight: 500;
  letter-spacing: .04em;
  text-align: center;
}
.kanji-card .kc-kun {
  font-size: 11px;
  color: var(--red);
  text-align: center;
}
.kanji-card .kc-meaning {
  font-size: 11px;
  color: var(--ink-muted);
  text-align: center;
  margin-top: 2px;
}
.kanji-card .kc-lecon {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 9px;
  color: var(--ink-muted);
  letter-spacing: .06em;
}

/* ── GAME HEADER ── */
.game-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--paper-3);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #e8b84b);
  border-radius: 3px;
  transition: width .4s ease;
  width: 0%;
}
.counter { font-size: 13px; color: var(--ink-muted); white-space: nowrap; }
.game-score { font-family: 'Shippori Mincho', serif; font-size: 15px; color: var(--gold); white-space: nowrap; }

/* ── FLASHCARDS ── */
.flashcard-arena {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}
.flashcard {
  width: 100%;
  max-width: 480px;
  height: 280px;
  cursor: pointer;
  perspective: 1200px;
}
.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.4,0,.2,1);
}
.flashcard.flipped .flashcard-inner {
  transform: rotateY(180deg);
}
.flashcard-front,
.flashcard-back {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  background: var(--paper);
  border: 1.5px solid var(--paper-3);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: var(--shadow-lg);
  padding: 28px 24px;
}
.flashcard-back {
  transform: rotateY(180deg);
}
.fc-kanji {
  font-family: 'Shippori Mincho', serif;
  font-size: 96px;
  line-height: 1;
  color: var(--ink);
}
.fc-hint { font-size: 12px; color: var(--ink-muted); letter-spacing: .06em; }
.fc-readings {
  display: flex;
  gap: 20px;
  justify-content: center;
}
.reading-block {
  text-align: center;
  font-size: 13px;
}
.reading-block span.label {
  display: block;
  font-size: 9px;
  letter-spacing: .1em;
  color: var(--ink-muted);
  text-transform: uppercase;
  margin-bottom: 3px;
}
.reading-block span.vals { color: var(--ink); }
.fc-meaning {
  font-family: 'Shippori Mincho', serif;
  font-size: 20px;
  color: var(--ink);
  text-align: center;
}
.fc-lecon { font-size: 11px; color: var(--ink-muted); }
.fc-actions {
  display: flex;
  gap: 16px;
}
.btn-wrong, .btn-right {
  padding: 12px 28px;
  border: none;
  border-radius: var(--radius-md);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all .18s;
  font-weight: 500;
}
.btn-wrong { background: var(--red-soft); color: var(--red); }
.btn-wrong:hover { background: var(--red); color: #fff; }
.btn-right { background: var(--green-soft); color: var(--green); }
.btn-right:hover { background: var(--green); color: #fff; }

/* ── QCM ── */
.qcm-arena { max-width: 560px; margin: 0 auto; }
.qcm-question { text-align: center; margin-bottom: 28px; }
.qcm-kanji {
  font-family: 'Shippori Mincho', serif;
  font-size: 88px;
  line-height: 1;
  margin-bottom: 10px;
}
.qcm-prompt { font-size: 14px; color: var(--ink-muted); }
.qcm-choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.choice-btn {
  background: var(--paper);
  border: 1.5px solid var(--paper-3);
  border-radius: var(--radius-md);
  padding: 14px 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  color: var(--ink);
  cursor: pointer;
  transition: all .18s;
  text-align: center;
}
.choice-btn:hover:not(:disabled) { border-color: var(--ink-muted); background: var(--paper-2); }
.choice-btn.correct  { background: var(--green-soft); border-color: var(--green); color: var(--green); }
.choice-btn.wrong    { background: var(--red-soft); border-color: var(--red); color: var(--red); }
.choice-btn:disabled { cursor: default; }
.qcm-feedback {
  text-align: center;
  padding: 12px;
  border-radius: var(--radius-md);
  font-size: 14px;
  margin-bottom: 12px;
}
.qcm-feedback.correct { background: var(--green-soft); color: var(--green); }
.qcm-feedback.wrong   { background: var(--red-soft);   color: var(--red); }

/* ── ORTHOGRAPHE ── */
.orth-arena { max-width: 480px; margin: 0 auto; }
.orth-question { text-align: center; margin-bottom: 28px; }
.orth-kanji {
  font-family: 'Shippori Mincho', serif;
  font-size: 96px;
  line-height: 1;
  margin-bottom: 8px;
}
.orth-prompt { font-size: 14px; color: var(--ink-muted); }
.orth-input-wrap {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}
.orth-input {
  flex: 1;
  background: var(--paper);
  border: 1.5px solid var(--paper-3);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  color: var(--ink);
  outline: none;
  transition: border-color .18s;
}
.orth-input:focus { border-color: var(--ink-muted); }
.btn-valider {
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: var(--radius-md);
  padding: 12px 20px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: opacity .18s;
}
.btn-valider:hover { opacity: .82; }
.orth-feedback {
  text-align: center;
  padding: 10px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  margin-bottom: 8px;
}
.orth-feedback.correct { background: var(--green-soft); color: var(--green); }
.orth-feedback.wrong   { background: var(--red-soft);   color: var(--red); }
.orth-answer {
  text-align: center;
  font-size: 13px;
  color: var(--ink-muted);
  padding: 6px;
}

/* ── MÉMOIRE ── */
.mem-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 10px;
  max-width: 700px;
  margin: 0 auto 20px;
}
.mem-card {
  aspect-ratio: 1;
  background: var(--ink);
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Shippori Mincho', serif;
  font-size: 22px;
  color: transparent;
  position: relative;
  overflow: hidden;
  transition: transform .18s, box-shadow .18s;
  user-select: none;
}
.mem-card::before {
  content: '漢';
  position: absolute;
  font-size: 28px;
  color: rgba(232,184,75,.15);
}
.mem-card:hover:not(.revealed):not(.matched) { transform: scale(1.04); }
.mem-card.revealed, .mem-card.matched {
  color: var(--ink);
  background: var(--paper);
  border: 1.5px solid var(--paper-3);
  font-size: 16px;
}
.mem-card.revealed::before, .mem-card.matched::before { display: none; }
.mem-card.matched { background: var(--green-soft); border-color: var(--green); color: var(--green); }
.mem-card.shake {
  animation: shake .35s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}

/* ── SHARED BUTTONS ── */
.btn-next {
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: var(--radius-md);
  padding: 12px 28px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  cursor: pointer;
  display: block;
  margin: 0 auto;
  transition: opacity .18s;
}
.btn-next:hover { opacity: .82; }
.btn-restart {
  background: transparent;
  border: 1.5px solid var(--paper-3);
  color: var(--ink-muted);
  border-radius: var(--radius-md);
  padding: 9px 22px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  cursor: pointer;
  display: block;
  margin: 24px auto 0;
  transition: all .18s;
}
.btn-restart:hover { border-color: var(--ink-muted); color: var(--ink); }
.hidden { display: none !important; }

/* ── MODAL ── */
.modal {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(26,20,16,.55);
  backdrop-filter: blur(4px);
}
.modal-card {
  position: relative;
  background: var(--paper);
  border-radius: var(--radius-lg);
  padding: 36px 40px;
  max-width: 380px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none;
  border: none;
  font-size: 16px;
  color: var(--ink-muted);
  cursor: pointer;
}
.modal-kanji {
  font-family: 'Shippori Mincho', serif;
  font-size: 80px;
  line-height: 1;
  margin-bottom: 24px;
}
.modal-details { text-align: left; }
.modal-row {
  display: flex;
  gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--paper-3);
  align-items: flex-start;
}
.modal-row:last-child { border-bottom: none; }
.modal-label {
  font-size: 11px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  min-width: 72px;
  padding-top: 2px;
}
.modal-val { font-size: 14px; color: var(--ink); }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .header-inner { padding: 0 14px; gap: 12px; }
  .main-nav { display: none; }
  .kanji-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  .fc-kanji { font-size: 72px; }
  .qcm-kanji { font-size: 64px; }
  .qcm-choices { grid-template-columns: 1fr; }
}

</style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-kanji">漢</span>
        <div class="logo-text">
          <span class="logo-title">Kanji-dō</span>
          <span class="logo-sub">漢字道</span>
        </div>
      </div>
      <nav class="main-nav">
        <button class="nav-btn active" data-view="list">📚 Liste</button>
        <button class="nav-btn" data-view="flashcards">🃏 Flashcards</button>
        <button class="nav-btn" data-view="qcm">❓ QCM</button>
        <button class="nav-btn" data-view="orthographe">✍️ Orthographe</button>
        <button class="nav-btn" data-view="memoire">🧩 Mémoire</button>
      </nav>
      <div class="header-score">
        <span class="score-label">Score</span>
        <span class="score-value" id="total-score">0</span>
      </div>
    </div>
  </header>

  <!-- LECON SELECTOR -->
  <div class="lecon-bar">
    <button class="lecon-btn active" data-lecon="all">Toutes</button>
    <button class="lecon-btn" data-lecon="1">Leçon 1</button>
    <button class="lecon-btn" data-lecon="2">Leçon 2</button>
    <button class="lecon-btn" data-lecon="3">Leçon 3</button>
    <button class="lecon-btn" data-lecon="4">Leçon 4</button>
    <button class="lecon-btn" data-lecon="5">Leçon 5</button>
    <button class="lecon-btn" data-lecon="6">Leçon 6</button>
    <button class="lecon-btn" data-lecon="7">Leçon 7</button>
  </div>

  <!-- MAIN CONTENT -->
  <main id="app">

    <!-- ===== VUE LISTE ===== -->
    <section id="view-list" class="view active">
      <div class="list-search">
        <input type="text" id="search-input" placeholder="Rechercher un kanji ou un sens…">
      </div>
      <div id="kanji-grid" class="kanji-grid"></div>
    </section>

    <!-- ===== VUE FLASHCARDS ===== -->
    <section id="view-flashcards" class="view">
      <div class="game-header">
        <div class="progress-bar"><div id="fc-progress" class="progress-fill"></div></div>
        <span id="fc-counter" class="counter">0 / 0</span>
      </div>
      <div class="flashcard-arena">
        <div id="flashcard" class="flashcard">
          <div class="flashcard-inner" id="flashcard-inner">
            <div class="flashcard-front">
              <div class="fc-kanji" id="fc-kanji">漢</div>
              <div class="fc-hint" id="fc-hint">Cliquez pour révéler</div>
            </div>
            <div class="flashcard-back">
              <div class="fc-readings">
                <div class="reading-block" id="fc-on"></div>
                <div class="reading-block" id="fc-kun"></div>
              </div>
              <div class="fc-meaning" id="fc-meaning"></div>
              <div class="fc-lecon" id="fc-lecon"></div>
            </div>
          </div>
        </div>
        <div class="fc-actions" id="fc-actions" style="display:none">
          <button class="btn-wrong" id="fc-wrong">✗ À revoir</button>
          <button class="btn-right" id="fc-right">✓ Connu</button>
        </div>
      </div>
      <button class="btn-restart" id="fc-restart">Recommencer</button>
    </section>

    <!-- ===== VUE QCM ===== -->
    <section id="view-qcm" class="view">
      <div class="game-header">
        <div class="progress-bar"><div id="qcm-progress" class="progress-fill"></div></div>
        <span id="qcm-counter" class="counter">0 / 0</span>
        <span id="qcm-score" class="game-score">0 pts</span>
      </div>
      <div class="qcm-arena">
        <div class="qcm-question">
          <div id="qcm-kanji" class="qcm-kanji">漢</div>
          <div id="qcm-prompt" class="qcm-prompt">Quelle est la lecture on'yomi ?</div>
        </div>
        <div id="qcm-choices" class="qcm-choices"></div>
        <div id="qcm-feedback" class="qcm-feedback hidden"></div>
        <button class="btn-next hidden" id="qcm-next">Suivant →</button>
      </div>
      <button class="btn-restart" id="qcm-restart">Recommencer</button>
    </section>

    <!-- ===== VUE ORTHOGRAPHE ===== -->
    <section id="view-orthographe" class="view">
      <div class="game-header">
        <div class="progress-bar"><div id="orth-progress" class="progress-fill"></div></div>
        <span id="orth-counter" class="counter">0 / 0</span>
        <span id="orth-score" class="game-score">0 pts</span>
      </div>
      <div class="orth-arena">
        <div class="orth-question">
          <div id="orth-kanji" class="orth-kanji">漢</div>
          <div id="orth-prompt" class="orth-prompt">Écrivez la lecture en hiragana/romaji</div>
        </div>
        <div class="orth-input-wrap">
          <input type="text" id="orth-input" class="orth-input" placeholder="Votre réponse…" autocomplete="off">

/* ============================================================

   Gère : navigation, filtres, liste, flashcards, QCM,
          orthographe, mémoire, score global

// ── STATE ──────────────────────────────────────────────────
let currentLecon = 'all';
let currentView  = 'list';
let totalScore   = 0;

function getFiltered() {
  if (currentLecon === 'all') return [...KANJI_DATA];
  return KANJI_DATA.filter(k => k.lecon === Number(currentLecon));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function addScore(pts) {
  totalScore += pts;
  document.getElementById('total-score').textContent = totalScore;
}

// ── NAVIGATION ─────────────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + currentView).classList.add('active');
    initView(currentView);
  });
});

document.querySelectorAll('.lecon-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lecon-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLecon = btn.dataset.lecon;
    initView(currentView);
  });
});

function initView(view) {
  if (view === 'list')        renderList();
  if (view === 'flashcards')  initFlashcards();
  if (view === 'qcm')         initQCM();
  if (view === 'orthographe') initOrth();
  if (view === 'memoire')     initMemoire();
}

// ── LISTE ──────────────────────────────────────────────────
function renderList(filter = '') {
  const grid = document.getElementById('kanji-grid');
  let data = getFiltered();
  if (filter) {
    const f = filter.toLowerCase();
    data = data.filter(k =>
      k.kanji.includes(f) ||
      k.meaning.toLowerCase().includes(f) ||
      k.on.some(r => r.toLowerCase().includes(f)) ||
      k.kun.some(r => r.includes(f))
    );
  }
  grid.innerHTML = data.map(k => `
    <div class="kanji-card" data-kanji="${k.kanji}">
      <span class="kc-lecon">L${k.lecon}</span>
      <div class="kc-char">${k.kanji}</div>
      <div class="kc-on">${k.on.join(' · ') || '—'}</div>
      <div class="kc-kun">${k.kun.join(' · ') || '—'}</div>
      <div class="kc-meaning">${k.meaning}</div>
    </div>
  `).join('');

  grid.querySelectorAll('.kanji-card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.kanji));
  });
}

document.getElementById('search-input').addEventListener('input', e => {
  renderList(e.target.value);
});

// ── MODAL ──────────────────────────────────────────────────
function openModal(char) {
  const k = KANJI_DATA.find(x => x.kanji === char);
  if (!k) return;
  document.getElementById('modal-kanji').textContent = k.kanji;
  document.getElementById('modal-on').textContent = k.on.join(', ') || '—';
  document.getElementById('modal-kun').textContent = k.kun.join(', ') || '—';
  document.getElementById('modal-meaning').textContent = k.meaning;
  document.getElementById('modal-lecon').textContent = 'Leçon ' + k.lecon;
  document.getElementById('kanji-modal').classList.remove('hidden');
}
document.querySelector('.modal-close').addEventListener('click', () => {
  document.getElementById('kanji-modal').classList.add('hidden');
});
document.querySelector('.modal-backdrop').addEventListener('click', () => {
  document.getElementById('kanji-modal').classList.add('hidden');
});

// ── FLASHCARDS ─────────────────────────────────────────────
let fcDeck = [], fcIndex = 0, fcFlipped = false;

function initFlashcards() {
  fcDeck = shuffle(getFiltered());
  fcIndex = 0;
  fcFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('fc-actions').style.display = 'none';
  renderFC();
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}
function setHTML(id, val) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = val;
}

function renderFC() {
  const total = fcDeck.length;
  if (fcIndex >= total) {
    setText('fc-kanji', '✓');
    setText('fc-hint', 'Terminé !');
    const actions = document.getElementById('fc-actions');
    if (actions) actions.style.display = 'none';
    const prog = document.getElementById('fc-progress');
    if (prog) prog.style.width = '100%';
    setText('fc-counter', total + ' / ' + total);
    return;
  }
  const k = fcDeck[fcIndex];
  setText('fc-kanji', k.kanji);
  setText('fc-hint', 'Cliquez pour révéler');
  const prog = document.getElementById('fc-progress');
  if (prog) prog.style.width = (fcIndex / total * 100) + '%';
  setText('fc-counter', (fcIndex + 1) + ' / ' + total);
  setHTML('fc-on', `<span class="label">On'yomi</span><span class="vals">${k.on.join(' · ') || '—'}</span>`);
  setHTML('fc-kun', `<span class="label">Kun'yomi</span><span class="vals">${k.kun.join(' · ') || '—'}</span>`);
  setText('fc-meaning', k.meaning);
  setText('fc-lecon', 'Leçon ' + k.lecon);
}

document.getElementById('flashcard').addEventListener('click', () => {
  if (fcIndex >= fcDeck.length) return;
  fcFlipped = !fcFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', fcFlipped);
  document.getElementById('fc-actions').style.display = fcFlipped ? 'flex' : 'none';
});

document.getElementById('fc-right').addEventListener('click', (e) => {
  e.stopPropagation();
  addScore(2);
  fcIndex++;
  fcFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('fc-actions').style.display = 'none';
  renderFC();
});

document.getElementById('fc-wrong').addEventListener('click', (e) => {
  e.stopPropagation();
  fcDeck.push(fcDeck[fcIndex]);
  fcDeck.splice(fcIndex, 1);
  fcFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('fc-actions').style.display = 'none';
  renderFC();
});

document.getElementById('fc-restart').addEventListener('click', initFlashcards);

// ── QCM ────────────────────────────────────────────────────
let qcmDeck = [], qcmIndex = 0, qcmScore = 0;
const QCM_TYPES = [
  { prompt: "Quelle est la lecture on'yomi ?", key: 'on' },
  { prompt: "Quelle est la lecture kun'yomi ?", key: 'kun' },
  { prompt: "Quel est le sens de ce kanji ?",   key: 'meaning' },
];

function initQCM() {
  qcmDeck = shuffle(getFiltered().filter(k => k.on.length > 0 || k.kun.length > 0));
  qcmIndex = 0;
  qcmScore = 0;
  document.getElementById('qcm-score').textContent = '0 pts';
  document.getElementById('qcm-next').classList.add('hidden');
  document.getElementById('qcm-feedback').classList.add('hidden');
  renderQCM();
}

function renderQCM() {
  const total = qcmDeck.length;
  if (qcmIndex >= total) {
    document.getElementById('qcm-kanji').textContent = '✓';
    document.getElementById('qcm-prompt').textContent = 'Terminé ! Score : ' + qcmScore + ' pts';
    document.getElementById('qcm-choices').innerHTML = '';
    document.getElementById('qcm-progress').style.width = '100%';
    document.getElementById('qcm-counter').textContent = total + ' / ' + total;
    return;
  }

  const k = qcmDeck[qcmIndex];
  // Pick a question type that has data
  const validTypes = QCM_TYPES.filter(t =>
    t.key === 'meaning' || (Array.isArray(k[t.key]) && k[t.key].length > 0)
  );
  const type = validTypes[Math.floor(Math.random() * validTypes.length)];

  document.getElementById('qcm-kanji').textContent = k.kanji;
  document.getElementById('qcm-prompt').textContent = type.prompt;
  document.getElementById('qcm-progress').style.width = (qcmIndex / total * 100) + '%';
  document.getElementById('qcm-counter').textContent = (qcmIndex + 1) + ' / ' + total;
  document.getElementById('qcm-feedback').classList.add('hidden');
  document.getElementById('qcm-next').classList.add('hidden');

  // Correct answer
  let correct;
  if (type.key === 'meaning') {
    correct = k.meaning;
  } else {
    correct = k[type.key][0];
  }

  // Wrong answers from pool
  const pool = KANJI_DATA.filter(x => x.kanji !== k.kanji);
  let wrongs = shuffle(pool).slice(0, 3).map(x => {
    if (type.key === 'meaning') return x.meaning;
    const arr = x[type.key];
    return arr && arr.length > 0 ? arr[0] : x.meaning;
  });
  // Remove duplicates
  wrongs = [...new Set(wrongs)].slice(0, 3);
  while (wrongs.length < 3) wrongs.push('—');

  const choices = shuffle([correct, ...wrongs]);

  const choicesEl = document.getElementById('qcm-choices');
  choicesEl.innerHTML = choices.map(c => `
    <button class="choice-btn" data-val="${c}">${c}</button>
  `).join('');

  choicesEl.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const chosen = btn.dataset.val;
      const isCorrect = chosen === correct;
      choicesEl.querySelectorAll('.choice-btn').forEach(b => {
        b.disabled = true;
        if (b.dataset.val === correct) b.classList.add('correct');
        else if (b === btn && !isCorrect) b.classList.add('wrong');
      });

      const feedback = document.getElementById('qcm-feedback');
      if (isCorrect) {
        feedback.textContent = '✓ Correct !';
        feedback.className = 'qcm-feedback correct';
        qcmScore += 5;
        addScore(5);
        document.getElementById('qcm-score').textContent = qcmScore + ' pts';
      } else {
        feedback.textContent = '✗ Incorrect. Réponse : ' + correct;
        feedback.className = 'qcm-feedback wrong';
      }
      feedback.classList.remove('hidden');
      document.getElementById('qcm-next').classList.remove('hidden');
    });
  });
}

document.getElementById('qcm-next').addEventListener('click', () => {
  qcmIndex++;
  renderQCM();
});
document.getElementById('qcm-restart').addEventListener('click', initQCM);

// ── ORTHOGRAPHE ────────────────────────────────────────────
let orthDeck = [], orthIndex = 0, orthScore = 0;

function initOrth() {
  orthDeck = shuffle(getFiltered());
  orthIndex = 0;
  orthScore = 0;
  document.getElementById('orth-score').textContent = '0 pts';
  document.getElementById('orth-next').classList.add('hidden');
  document.getElementById('orth-feedback').classList.add('hidden');
  document.getElementById('orth-answer').classList.add('hidden');
  document.getElementById('orth-input').value = '';
  renderOrth();
}

function renderOrth() {
  const total = orthDeck.length;
  if (orthIndex >= total) {
    document.getElementById('orth-kanji').textContent = '✓';
    document.getElementById('orth-prompt').textContent = 'Terminé ! Score : ' + orthScore + ' pts';
    document.getElementById('orth-input').disabled = true;
    document.getElementById('orth-progress').style.width = '100%';
    document.getElementById('orth-counter').textContent = total + ' / ' + total;
    return;
  }
  const k = orthDeck[orthIndex];
  document.getElementById('orth-kanji').textContent = k.kanji;
  document.getElementById('orth-prompt').textContent = 'Donnez une lecture (on\'yomi, kun\'yomi ou sens)';
  document.getElementById('orth-progress').style.width = (orthIndex / total * 100) + '%';
  document.getElementById('orth-counter').textContent = (orthIndex + 1) + ' / ' + total;
  document.getElementById('orth-input').value = '';
  document.getElementById('orth-input').disabled = false;
  document.getElementById('orth-input').focus();
  document.getElementById('orth-feedback').classList.add('hidden');
  document.getElementById('orth-answer').classList.add('hidden');
  document.getElementById('orth-next').classList.add('hidden');
}

function checkOrth() {
  const k = orthDeck[orthIndex];
  const input = document.getElementById('orth-input').value.trim().toLowerCase();
  if (!input) return;

  const allAccepted = [
    ...k.on.map(r => r.toLowerCase()),
    ...k.kun.map(r => r.toLowerCase()),
    ...k.meaning.toLowerCase().split(',').map(s => s.trim()),
    k.meaning.toLowerCase(),
  ];

  const isCorrect = allAccepted.some(a => input === a || a.includes(input) || input.includes(a));

  const feedback = document.getElementById('orth-feedback');
  const answer   = document.getElementById('orth-answer');
  document.getElementById('orth-input').disabled = true;

  if (isCorrect) {
    feedback.textContent = '✓ Correct !';
    feedback.className = 'orth-feedback correct';
    orthScore += 3;
    addScore(3);
    document.getElementById('orth-score').textContent = orthScore + ' pts';
  } else {
    feedback.textContent = '✗ Incorrect';
    feedback.className = 'orth-feedback wrong';
    answer.textContent = 'On\'yomi : ' + (k.on.join(', ') || '—') +
                         '　Kun\'yomi : ' + (k.kun.join(', ') || '—') +
                         '　Sens : ' + k.meaning;
    answer.classList.remove('hidden');
  }
  feedback.classList.remove('hidden');
  document.getElementById('orth-next').classList.remove('hidden');
}

document.getElementById('orth-valider').addEventListener('click', checkOrth);
document.getElementById('orth-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkOrth();
});
document.getElementById('orth-next').addEventListener('click', () => {
  orthIndex++;
  renderOrth();
});
document.getElementById('orth-restart').addEventListener('click', initOrth);

// ── MÉMOIRE ────────────────────────────────────────────────
let memCards = [], memRevealed = [], memMatched = 0, memMoves = 0, memTimer = 0, memInterval = null;

function initMemoire() {
  clearInterval(memInterval);
  memTimer = 0; memMoves = 0; memMatched = 0;
  document.getElementById('mem-timer').textContent = '0s';
  document.getElementById('mem-moves').textContent = '0 coups';

  const pool = shuffle(getFiltered()).slice(0, 8);
  // Each kanji gets 2 cards: one showing kanji, one showing meaning
  const pairs = [];
  pool.forEach(k => {
    pairs.push({ id: k.kanji + '_k', pairId: k.kanji, display: k.kanji,     type: 'kanji'   });
    pairs.push({ id: k.kanji + '_m', pairId: k.kanji, display: k.meaning.split(',')[0].trim(), type: 'meaning' });
  });
  memCards = shuffle(pairs);
  memRevealed = [];

  const grid = document.getElementById('mem-grid');
  grid.innerHTML = memCards.map((c, i) => `
    <div class="mem-card" data-index="${i}" data-pair="${c.pairId}" data-display="${c.display}">
      ${c.display}
    </div>
  `).join('');

  grid.querySelectorAll('.mem-card').forEach(card => {
    card.addEventListener('click', () => flipMemCard(card));
  });

  document.getElementById('mem-pairs').textContent = '0 / ' + pool.length + ' paires';

  memInterval = setInterval(() => {
    memTimer++;
    document.getElementById('mem-timer').textContent = memTimer + 's';
  }, 1000);
}

function flipMemCard(card) {
  if (card.classList.contains('revealed') || card.classList.contains('matched')) return;
  if (memRevealed.length >= 2) return;

  card.classList.add('revealed');
  memRevealed.push(card);

  if (memRevealed.length === 2) {
    memMoves++;
    document.getElementById('mem-moves').textContent = memMoves + ' coups';
    const [a, b] = memRevealed;
    if (a.dataset.pair === b.dataset.pair && a !== b) {
      // Match!
      a.classList.remove('revealed'); b.classList.remove('revealed');
      a.classList.add('matched');     b.classList.add('matched');
      memMatched++;
      const total = memCards.length / 2;
      document.getElementById('mem-pairs').textContent = memMatched + ' / ' + total + ' paires';
      addScore(10);
      memRevealed = [];
      if (memMatched === total) {
        clearInterval(memInterval);
        setTimeout(() => alert(`🎉 Bravo ! ${total} paires trouvées en ${memMoves} coups et ${memTimer}s !`), 200);
      }
    } else {
      // No match
      setTimeout(() => {
        a.classList.remove('revealed'); b.classList.remove('revealed');
        a.classList.add('shake');       b.classList.add('shake');
        setTimeout(() => { a.classList.remove('shake'); b.classList.remove('shake'); }, 400);
        memRevealed = [];
      }, 900);
    }
  }
}

document.getElementById('mem-restart').addEventListener('click', initMemoire);
